version: 2

models:
  - name: fct_monthly_revenue
    description: "Monthly revenue aggregated by region and product category. Used for trend analysis and regional performance dashboards."
    columns:
      - name: order_year
        description: "Calendar year of the orders"
        tests:
          - not_null
      - name: order_month_num
        description: "Month number (1-12)"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 12
      - name: customer_region
        description: "Customer geographic region"
        tests:
          - not_null
      - name: product_category
        description: "Product category"
        tests:
          - not_null
      - name: total_orders
        description: "Count of distinct orders"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
      - name: total_revenue
        description: "Sum of revenue across all line items"
        tests:
          - not_null
      - name: total_profit
        description: "Sum of profit (revenue - supply_cost)"
        tests:
          - not_null
      - name: revenue_per_order
        description: "Average revenue per order"
        tests:
          - not_null

  - name: fct_customer_lifetime_value
    description: "Customer lifetime value — total revenue, profit, order count, and years active per customer. Used for customer segmentation and retention analysis."
    columns:
      - name: customer_key
        description: "Unique customer identifier"
        tests:
          - unique
          - not_null
      - name: lifetime_revenue
        description: "Total revenue from this customer across all orders"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: total_orders
        description: "Number of distinct orders placed"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
      - name: years_active
        description: "Number of years between first and last order"
        tests:
          - not_null
      - name: avg_order_value
        description: "Average revenue per order for this customer"
        tests:
          - not_null

  - name: fct_product_performance
    description: "Product performance metrics — revenue, profit margin, unique customers per product. Used for product portfolio analysis and merchandising decisions."
    columns:
      - name: part_key
        description: "Unique product identifier"
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: "Total revenue generated by this product"
        tests:
          - not_null
      - name: total_profit
        description: "Total profit from this product"
        tests:
          - not_null
      - name: profit_margin_pct
        description: "Profit as percentage of revenue"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
      - name: unique_customers
        description: "Number of distinct customers who bought this product"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
