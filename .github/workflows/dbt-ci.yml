name: dbt CI

on:
  pull_request:
    branches: [main]

env:
  DBT_PROFILES_DIR: .
  REDSHIFT_HOST: ${{ secrets.REDSHIFT_HOST }}
  REDSHIFT_USER: ${{ secrets.REDSHIFT_USER }}
  REDSHIFT_PASSWORD: ${{ secrets.REDSHIFT_PASSWORD }}

jobs:
  lint-and-test:
    name: Lint, Build & Test (Slim CI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install dbt-redshift sqlfluff sqlfluff-templater-dbt

      - name: SQL Lint
        run: sqlfluff lint models/ --config .sqlfluff
        continue-on-error: true

      - name: dbt deps
        run: dbt deps

      - name: Download production manifest
        uses: actions/download-artifact@v4
        with:
          name: dbt-manifest
          path: target-prod/
        continue-on-error: true

      - name: dbt build (slim CI - only modified + downstream)
        run: |
          if [ -f target-prod/manifest.json ]; then
            echo "Production manifest found — running slim CI"
            dbt build --select state:modified+ --state target-prod/
          else
            echo "No production manifest — running full build"
            dbt build
          fi

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install dbt-redshift

      - name: dbt deps
        run: dbt deps

      - name: Download production manifest
        uses: actions/download-artifact@v4
        with:
          name: dbt-manifest
          path: target-prod/
        continue-on-error: true

      - name: dbt build (production - only modified + downstream)
        run: |
          if [ -f target-prod/manifest.json ]; then
            dbt build --select state:modified+ --state target-prod/ --target prod
          else
            dbt build --target prod
          fi
        env:
          REDSHIFT_HOST: ${{ secrets.REDSHIFT_HOST }}
          REDSHIFT_USER: ${{ secrets.REDSHIFT_USER }}
          REDSHIFT_PASSWORD: ${{ secrets.REDSHIFT_PASSWORD }}

      - name: Upload production manifest
        uses: actions/upload-artifact@v4
        with:
          name: dbt-manifest
          path: target/manifest.json
          retention-days: 30
