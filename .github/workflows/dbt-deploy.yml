name: dbt Deploy

on:
  push:
    branches: [main]

env:
  DBT_PROFILES_DIR: .
  REDSHIFT_HOST: ${{ secrets.REDSHIFT_HOST }}
  REDSHIFT_USER: ${{ secrets.REDSHIFT_USER }}
  REDSHIFT_PASSWORD: ${{ secrets.REDSHIFT_PASSWORD }}

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install dbt-redshift

      - name: dbt deps
        run: dbt deps

      - name: Download production manifest
        uses: actions/download-artifact@v4
        with:
          name: dbt-manifest
          path: target-prod/
        continue-on-error: true

      - name: dbt build (production - only modified + downstream)
        run: |
          if [ -f target-prod/manifest.json ]; then
            echo "Production manifest found — deploying only changes"
            dbt build --select state:modified+ --state target-prod/ --target prod
          else
            echo "No production manifest — full build"
            dbt build --target prod
          fi

      - name: Upload production manifest
        uses: actions/upload-artifact@v4
        with:
          name: dbt-manifest
          path: target/manifest.json
          retention-days: 30
